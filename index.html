<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>動態貼圖製作</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="gif.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F3F4F6;
            overscroll-behavior: none;
            user-select: none;
        }

        .canvas-container {
            width: 370px;
            height: 320px;
            background-image: linear-gradient(45deg, #e5e5e5 25%, transparent 25%), 
                              linear-gradient(-45deg, #e5e5e5 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #e5e5e5 75%), 
                              linear-gradient(-45deg, transparent 75%, #e5e5e5 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            touch-action: none;
        }

        .frame-card {
            min-width: 80px;
            height: 80px;
            transition: all 0.2s;
        }

        .frame-card.active {
            border-color: #EF4444;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        #loadingOverlay {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="p-0 m-0 bg-gray-300 flex justify-center">

    <div class="w-full bg-white flex flex-col shadow-2xl relative" style="max-width:430px;min-height:100vh;">
        
        <!-- Header -->
        <header class="bg-red-500 text-white p-4 flex justify-between items-center shrink-0">
            <h1 class="text-2xl font-bold tracking-tight">動態貼圖製作</h1>
            <button onclick="previewAnimation()" id="previewBtn" class="bg-white text-red-500 px-4 py-1 rounded-full font-bold shadow-md action-btn">預覽播放</button>
        </header>

        <!-- Main Canvas Area -->
        <div class="flex flex-col items-center p-4 gap-3 bg-gray-50 shrink-0">
            
            <div id="canvasBox" class="canvas-container bg-white border-4 border-white rounded-lg overflow-hidden">
                <canvas id="mainCanvas" width="370" height="320"></canvas>
            </div>

            <div class="text-center text-sm text-gray-500 font-medium">
                💡 拖移物件位置，按住<span class="text-blue-500 font-bold">藍圈</span>旋轉縮放
            </div>
        </div>

        <!-- Frame Timeline -->
        <div class="w-full bg-gray-50 border-t border-gray-200 shrink-0">
            <div class="flex justify-between items-center px-4 pt-3 pb-1">
                <span class="font-bold text-gray-700 text-lg">動畫步驟</span>
                <button onclick="addFrame()" class="text-blue-600 font-bold text-lg">+ 新增步驟</button>
            </div>

                <div id="frameList" class="flex flex-wrap gap-4 px-4 pb-4 pt-1" style="align-items:flex-start;">
                    <!-- Frames -->
                </div>
        </div>

        <!-- Controls Panel -->
        <div class="bg-white border-t border-gray-200 p-4 shrink-0 pb-8">
            <div id="panel-add" class="flex flex-col gap-3">
                <!-- 挑選圖片 — 放最上方 -->
                <button onclick="document.getElementById('fileInput').click()" class="action-btn flex items-center justify-center p-4 bg-green-50 border-2 border-green-300 rounded-2xl gap-3">
                    <span class="text-3xl">🖼️</span>
                    <span class="font-bold text-xl text-green-700">挑選圖片</span>
                    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                </button>

                <!-- 第二排：寫文字 + 加小物件 -->
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="promptAddText()" class="action-btn flex flex-col items-center justify-center p-4 bg-yellow-50 border-2 border-yellow-200 rounded-2xl gap-2">
                        <span class="text-4xl">✍️</span>
                        <span class="font-bold text-lg">寫文字</span>
                    </button>
                    <button onclick="openStickerModal()" class="action-btn flex flex-col items-center justify-center p-4 bg-pink-50 border-2 border-pink-200 rounded-2xl gap-2">
                        <span class="text-4xl">🎨</span>
                        <span class="font-bold text-lg">加小物件</span>
                    </button>
                </div>

                <!-- 第三排：刪除 -->
                <button onclick="deleteSelected()" id="deleteBtn" class="action-btn flex items-center justify-center p-3 bg-gray-100 border-2 border-gray-200 rounded-2xl gap-3 opacity-30" disabled>
                    <span class="text-3xl">🗑️</span>
                    <span class="font-bold text-lg">刪除選中的物件</span>
                </button>
            </div>

            <button onclick="exportGIF()" class="w-full mt-5 py-4 bg-red-500 text-white rounded-2xl font-bold text-2xl shadow-lg action-btn">製作完成 (存成 GIF)</button>
                    <p class="text-center text-gray-500 mt-4 text-sm">
                        Billy ^.^ | Program improved by AI @2026
                    </p>
        </div>

        <!-- Sticker Picker Modal -->
        <div id="stickerModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-[120]" style="max-width:430px;margin:auto;">
            <div class="bg-white w-full rounded-3xl p-6 shadow-2xl">
                <h3 class="text-2xl font-bold mb-4 text-center">選一個小物件 🎉</h3>
                <div class="grid grid-cols-5 gap-3 mb-5" id="stickerGrid"></div>
                <button onclick="closeStickerModal()" class="w-full py-3 bg-gray-200 rounded-xl font-bold text-gray-600 text-lg">取消</button>
            </div>
        </div>

        <!-- Text Modal -->
        <div id="textModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-[120]">
            <div class="bg-white rounded-3xl p-5 shadow-2xl" style="width:280px;max-height:92vh;overflow-y:auto;">
                <h3 class="text-xl font-bold mb-3">✍️ 寫文字</h3>

                <!-- 多行文字輸入 -->
                <textarea id="textInput" rows="3" class="w-full border-2 border-gray-300 p-3 rounded-xl text-xl mb-1 block resize-none" placeholder="可輸入多行文字&#10;例如：早安&#10;新的一天"></textarea>

                <!-- 行距 -->
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-sm font-bold text-gray-500 whitespace-nowrap">行距</span>
                    <div class="flex gap-1 flex-1">
                        <button onclick="setLineHeight(1.0)" id="lh-10" class="flex-1 py-2 rounded-lg border-2 border-gray-200 bg-gray-50 font-bold text-gray-600 text-sm">緊</button>
                        <button onclick="setLineHeight(1.4)" id="lh-14" class="flex-1 py-2 rounded-lg border-2 border-blue-400 bg-blue-50 font-bold text-blue-600 text-sm">中</button>
                        <button onclick="setLineHeight(1.9)" id="lh-19" class="flex-1 py-2 rounded-lg border-2 border-gray-200 bg-gray-50 font-bold text-gray-600 text-sm">寬</button>
                        <button onclick="setLineHeight(2.5)" id="lh-25" class="flex-1 py-2 rounded-lg border-2 border-gray-200 bg-gray-50 font-bold text-gray-600 text-sm">超寬</button>
                    </div>
                </div>

                <!-- 文字顏色 -->
                <div class="text-sm font-bold text-gray-500 mb-1">🖊 文字顏色</div>
                <div class="flex flex-wrap gap-2 items-center mb-3">
                    <button onclick="setTextColor('#EF4444')" class="w-9 h-9 rounded-full bg-red-500 border-4 border-white shadow"></button>
                    <button onclick="setTextColor('#3B82F6')" class="w-9 h-9 rounded-full bg-blue-500 border-4 border-white shadow"></button>
                    <button onclick="setTextColor('#10B981')" class="w-9 h-9 rounded-full bg-green-500 border-4 border-white shadow"></button>
                    <button onclick="setTextColor('#F59E0B')" class="w-9 h-9 rounded-full bg-yellow-500 border-4 border-white shadow"></button>
                    <button onclick="setTextColor('#8B5CF6')" class="w-9 h-9 rounded-full bg-purple-500 border-4 border-white shadow"></button>
                    <button onclick="setTextColor('#000000')" class="w-9 h-9 rounded-full bg-black border-4 border-white shadow"></button>
                    <button onclick="setTextColor('#FFFFFF')" class="w-9 h-9 rounded-full bg-white border-4 border-gray-300 shadow"></button>
                    <label class="w-9 h-9 rounded-full border-4 border-dashed border-gray-400 flex items-center justify-center cursor-pointer relative overflow-hidden shadow" title="自訂">
                        <span>🎨</span>
                        <input type="color" id="customColorInput" onchange="setTextColor(this.value)" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                    </label>
                    <div id="colorPreview" class="w-9 h-9 rounded-full border-2 border-gray-300 shadow" style="background:#EF4444"></div>
                </div>

                <!-- 框線顏色 -->
                <div class="border-t border-gray-100 mb-3"></div>
                <div class="text-sm font-bold text-gray-500 mb-1">🔲 框線顏色</div>
                <div class="flex flex-wrap gap-2 items-center mb-3">
                    <button onclick="setStrokeColor('#FFFFFF')" class="w-9 h-9 rounded-full bg-white border-4 border-gray-300 shadow"></button>
                    <button onclick="setStrokeColor('#000000')" class="w-9 h-9 rounded-full bg-black border-4 border-white shadow"></button>
                    <button onclick="setStrokeColor('#EF4444')" class="w-9 h-9 rounded-full bg-red-500 border-4 border-white shadow"></button>
                    <button onclick="setStrokeColor('#3B82F6')" class="w-9 h-9 rounded-full bg-blue-500 border-4 border-white shadow"></button>
                    <button onclick="setStrokeColor('#F59E0B')" class="w-9 h-9 rounded-full bg-yellow-500 border-4 border-white shadow"></button>
                    <button onclick="setStrokeColor('#10B981')" class="w-9 h-9 rounded-full bg-green-500 border-4 border-white shadow"></button>
                    <button onclick="setStrokeColor('none')" class="w-9 h-9 rounded-full border-4 border-dashed border-gray-400 flex items-center justify-center shadow bg-gray-50 font-bold text-gray-500" title="無框線">✕</button>
                    <label class="w-9 h-9 rounded-full border-4 border-dashed border-blue-300 flex items-center justify-center cursor-pointer relative overflow-hidden shadow" title="自訂">
                        <span>🎨</span>
                        <input type="color" id="customStrokeInput" onchange="setStrokeColor(this.value)" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                    </label>
                    <div id="strokeColorPreview" class="w-9 h-9 rounded-full border-2 border-gray-300 shadow" style="background:#FFFFFF"></div>
                </div>

                <!-- 框線粗細 -->
                <div class="text-sm font-bold text-gray-500 mb-1">📏 框線粗細</div>
                <div class="flex gap-1 mb-4">
                    <button onclick="setStrokeWidth(0)"  id="sw-0"  class="flex-1 py-2 rounded-lg border-2 border-gray-200 bg-gray-50 font-bold text-gray-500 text-sm">無</button>
                    <button onclick="setStrokeWidth(3)"  id="sw-3"  class="flex-1 py-2 rounded-lg border-2 border-gray-200 bg-gray-50 font-bold text-gray-600 text-sm">細</button>
                    <button onclick="setStrokeWidth(6)"  id="sw-6"  class="flex-1 py-2 rounded-lg border-2 border-blue-400 bg-blue-50 font-bold text-blue-600 text-sm">中</button>
                    <button onclick="setStrokeWidth(12)" id="sw-12" class="flex-1 py-2 rounded-lg border-2 border-gray-200 bg-gray-50 font-bold text-gray-600 text-sm">粗</button>
                    <button onclick="setStrokeWidth(20)" id="sw-20" class="flex-1 py-2 rounded-lg border-2 border-gray-200 bg-gray-50 font-bold text-gray-600 text-sm">超粗</button>
                </div>

                <!-- 即時預覽 -->
                <div class="mb-4 bg-gray-100 rounded-2xl overflow-hidden flex items-center justify-center" style="min-height:72px;">
                    <canvas id="textPreviewCanvas" width="240" height="68" style="display:block;max-width:100%;"></canvas>
                </div>

                <!-- 按鈕：上下排列 -->
                <button onclick="confirmAddText()" class="w-full py-3 mb-2 bg-red-500 text-white rounded-xl font-bold text-lg">確定加入</button>
                <button onclick="closeTextModal()" class="w-full py-3 bg-gray-200 rounded-xl font-bold text-lg text-gray-600">取消</button>
            </div>
        </div>

        <!-- Processing Overlay -->
        <div id="loadingOverlay" class="fixed inset-0 hidden flex-col items-center justify-center z-[200] text-white">
            <div class="w-16 h-16 border-4 border-white border-t-transparent rounded-full animate-spin mb-4"></div>
            <div class="text-xl font-bold tracking-widest" id="loadingText">處理中...</div>
        </div>
    </div>

    <script>
        // --- State ---
        let frames = [{ id: Date.now(), objects: [], duration: 400 }];
        let currentFrameIndex = 0;
        let selectedObjectIndex = -1;
        let isPreviewing = false;
        let previewInterval = null;
        let tempTextColor = "#EF4444";
        let tempStrokeColor = "#FFFFFF";
        let tempStrokeWidth = 6;
        let tempLineHeight = 1.4;

        let isDragging = false, isResizing = false;
        let lastMousePos = { x: 0, y: 0 };
        let startAngle = 0, startScale = 1;

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        window.onload = () => {
            renderFrameList();
            draw();
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('touchstart', (e) => onMouseDown(e.touches[0]), { passive: false });
            document.getElementById('textInput').addEventListener('input', () => { if(document.getElementById('textModal').style.display==='flex') updateTextPreview(); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); onMouseMove(e.touches[0]); }, { passive: false });
            window.addEventListener('touchend', onMouseUp);

        };

        function draw(targetCtx = ctx, frameIndex = currentFrameIndex, isExport = false) {
            const currentCanvas = targetCtx.canvas;
            targetCtx.clearRect(0, 0, currentCanvas.width, currentCanvas.height);
            const frame = frames[frameIndex];
            if (!frame) return;

            frame.objects.forEach((obj, index) => {
                targetCtx.save();
                targetCtx.translate(obj.x, obj.y);
                targetCtx.rotate(obj.rotation * Math.PI / 180);
                targetCtx.scale(obj.scale, obj.scale);

                let w = 80, h = 80;
                if (obj.type === 'image') { w = obj.w; h = obj.h; }

                if (obj.type === 'text' || obj.type === 'sticker') {
                    targetCtx.textAlign = "center";
                    targetCtx.textBaseline = "middle";
                    targetCtx.lineJoin = 'round';
                    if (obj.type === 'sticker') {
                        targetCtx.font = "60px Arial";
                        targetCtx.strokeStyle = "rgba(0,0,0,0.15)";
                        targetCtx.lineWidth = 2;
                        targetCtx.strokeText(obj.content, 0, 0);
                        targetCtx.fillStyle = obj.color || "black";
                        targetCtx.fillText(obj.content, 0, 0);
                    } else {
                        // multiline text
                        const fontSize = 40;
                        targetCtx.font = "bold " + fontSize + "px Noto Sans TC";
                        const lh = (obj.lineHeight || 1.4) * fontSize;
                        const lines = obj.content.split("\n");
                        const totalH = lh * lines.length;
                        const sw = (obj.strokeWidth !== undefined) ? obj.strokeWidth : 6;
                        const sc = obj.strokeColor || '#FFFFFF';
                        lines.forEach((line, li) => {
                            const ly = (li - (lines.length - 1) / 2) * lh;
                            if (sw > 0 && sc !== 'none') {
                                targetCtx.strokeStyle = sc;
                                targetCtx.lineWidth = sw;
                                targetCtx.strokeText(line, 0, ly);
                            }
                            targetCtx.fillStyle = obj.color || "black";
                            targetCtx.fillText(line, 0, ly);
                        });
                    }
                } else if (obj.type === 'image') {
                    targetCtx.drawImage(obj.img, -w/2, -h/2, w, h);
                }

                // 只有在非導出模式且選中時才繪製 UI 控點
                if (!isExport && index === selectedObjectIndex && !isPreviewing) {
                    targetCtx.restore(); targetCtx.save();
                    targetCtx.translate(obj.x, obj.y);
                    targetCtx.rotate(obj.rotation * Math.PI / 180);
                    const halfW = (w / 2) * obj.scale + 10;
                    const halfH = (h / 2) * obj.scale + 10;
                    targetCtx.strokeStyle = "#3B82F6";
                    targetCtx.setLineDash([5, 5]);
                    targetCtx.lineWidth = 2;
                    targetCtx.strokeRect(-halfW, -halfH, halfW * 2, halfH * 2);
                    targetCtx.setLineDash([]);
                    targetCtx.fillStyle = "white";
                    targetCtx.shadowBlur = 5;
                    targetCtx.shadowColor = "rgba(0,0,0,0.3)";
                    targetCtx.beginPath();
                    targetCtx.arc(halfW, halfH, 20, 0, Math.PI * 2);
                    targetCtx.fill();
                    targetCtx.strokeStyle = "#3B82F6";
                    targetCtx.lineWidth = 3;
                    targetCtx.stroke();
                    targetCtx.fillStyle = "#3B82F6";
                    targetCtx.font = "bold 16px Arial";
                    targetCtx.fillText("🔄", halfW, halfH);
                }
                targetCtx.restore();
            });
        }

        // --- Interaction ---
        function onMouseDown(e) {
            if (isPreviewing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            
            if (selectedObjectIndex !== -1) {
                const obj = frames[currentFrameIndex].objects[selectedObjectIndex];
                const w = obj.type === 'image' ? obj.w : 80, h = obj.type === 'image' ? obj.h : 80;
                const handleDistX = (w/2 * obj.scale + 10), handleDistY = (h/2 * obj.scale + 10);
                const angleRad = obj.rotation * Math.PI / 180;
                const dx = x - obj.x, dy = y - obj.y;
                const localX = dx * Math.cos(-angleRad) - dy * Math.sin(-angleRad);
                const localY = dx * Math.sin(-angleRad) + dy * Math.cos(-angleRad);
                if (Math.sqrt((localX - handleDistX)**2 + (localY - handleDistY)**2) < 30) {
                    isResizing = true;
                    startAngle = obj.rotation - Math.atan2(dy, dx) * 180 / Math.PI;
                    startScale = obj.scale / Math.sqrt(dx*dx + dy*dy);
                    return;
                }
            }

            let found = -1;
            for (let i = frames[currentFrameIndex].objects.length - 1; i >= 0; i--) {
                const o = frames[currentFrameIndex].objects[i];
                if (Math.sqrt((x - o.x)**2 + (y - o.y)**2) < 50 * o.scale) { found = i; break; }
            }
            selectedObjectIndex = found;
            updateUIState();
            if (found !== -1) { isDragging = true; lastMousePos = { x, y }; }
            draw();
        }

        function onMouseMove(e) {
            if (isPreviewing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            const obj = frames[currentFrameIndex].objects[selectedObjectIndex];
            if (isDragging && obj) {
                obj.x += (x - lastMousePos.x); obj.y += (y - lastMousePos.y);
                lastMousePos = { x, y }; draw();
            } else if (isResizing && obj) {
                const dx = x - obj.x, dy = y - obj.y;
                obj.scale = Math.max(0.3, Math.sqrt(dx*dx + dy*dy) * startScale);
                obj.rotation = startAngle + Math.atan2(dy, dx) * 180 / Math.PI;
                draw();
            }
        }

        function onMouseUp() { isDragging = false; isResizing = false; }
        function updateUIState() {
            const delBtn = document.getElementById('deleteBtn');
            delBtn.disabled = selectedObjectIndex === -1;
            delBtn.style.opacity = selectedObjectIndex === -1 ? "0.3" : "1";
        }

        const SPEED_PRESETS = [
            { label: '慢', ms: 900 },
            { label: '中', ms: 400 },
            { label: '快', ms: 150 },
        ];
        function getSpeedLabel(ms) {
            if (ms >= 700) return '慢';
            if (ms <= 200) return '快';
            return '中';
        }

        // --- Frame Control ---
        function renderFrameList() {
            const list = document.getElementById('frameList');
            list.innerHTML = '';
            frames.forEach((frame, index) => {
                const isActive = index === currentFrameIndex;
                const card = document.createElement('div');
                card.className = `frame-card flex-shrink-0 bg-white border-4 rounded-2xl flex flex-col items-center cursor-pointer relative ${isActive ? 'active' : 'border-gray-200'}`;
                card.style.cssText = 'min-width:120px;height:auto;padding:12px 10px 12px;gap:7px;';
                card.onclick = () => selectFrame(index);

                // 步驟編號
                const numLabel = document.createElement('div');
                numLabel.style.cssText = `font-size:18px;font-weight:bold;color:${isActive ? '#EF4444' : '#9CA3AF'};`;
                numLabel.innerText = `第 ${index + 1} 張`;
                card.appendChild(numLabel);

                // 速度區塊
                const speedTitle = document.createElement('div');
                speedTitle.style.cssText = 'font-size:13px;color:#6B7280;font-weight:bold;';
                speedTitle.innerText = '⏱ 顯示速度';
                card.appendChild(speedTitle);

                const speedRow = document.createElement('div');
                speedRow.style.cssText = 'display:flex;gap:5px;';
                speedRow.onclick = (e) => e.stopPropagation();
                const currentLabel = getSpeedLabel(frame.duration || 400);
                SPEED_PRESETS.forEach(preset => {
                    const btn = document.createElement('button');
                    const isSel = preset.label === currentLabel;
                    btn.innerText = preset.label;
                    btn.style.cssText = [
                        'font-size:16px;font-weight:bold;',
                        'padding:7px 10px;border-radius:10px;',
                        `border:2px solid ${isSel ? '#3B82F6' : '#D1D5DB'};`,
                        `background:${isSel ? '#3B82F6' : '#F3F4F6'};`,
                        `color:${isSel ? 'white' : '#374151'};`,
                        'cursor:pointer;min-width:38px;',
                        isSel ? 'box-shadow:0 2px 8px rgba(59,130,246,0.35);' : '',
                    ].join('');
                    btn.onclick = (e) => { e.stopPropagation(); frames[index].duration = preset.ms; renderFrameList(); };
                    speedRow.appendChild(btn);
                });
                card.appendChild(speedRow);

                // 下載PNG大按鈕
                const dlBtn = document.createElement('button');
                dlBtn.innerHTML = '⬇️ 下載這張';
                dlBtn.style.cssText = [
                    'width:100%;margin-top:2px;',
                    'font-size:15px;font-weight:bold;letter-spacing:0.5px;',
                    'background:#10B981;color:white;',
                    'border-radius:12px;padding:10px 4px;',
                    'box-shadow:0 3px 8px rgba(16,185,129,0.35);',
                ].join('');
                dlBtn.onclick = (e) => { e.stopPropagation(); downloadFramePNG(index); };
                card.appendChild(dlBtn);

                if (isActive) {
                    const copyBtn = document.createElement('button');
                    copyBtn.innerHTML = '➕';
                    copyBtn.className = 'absolute -top-3 -right-3 bg-blue-500 text-white rounded-full w-9 h-9 flex items-center justify-center shadow-lg font-bold text-lg';
                    copyBtn.onclick = (e) => { e.stopPropagation(); duplicateFrame(index); };
                    card.appendChild(copyBtn);

                    const delBtn2 = document.createElement('button');
                    delBtn2.innerHTML = '🗑️';
                    delBtn2.className = 'absolute -bottom-3 -right-3 bg-red-500 text-white rounded-full w-9 h-9 flex items-center justify-center shadow-lg text-base';
                    delBtn2.onclick = (e) => { e.stopPropagation(); deleteFrame(index); };
                    card.appendChild(delBtn2);
                }
                list.appendChild(card);
            });


        }

        function selectFrame(index) {
            currentFrameIndex = index; selectedObjectIndex = -1; updateUIState();
            renderFrameList(); draw();
        }

        function addFrame() { frames.push({ id: Date.now(), objects: [], duration: 400 }); selectFrame(frames.length - 1); }

        function duplicateFrame(index) {
            const newObjs = JSON.parse(JSON.stringify(frames[index].objects));
            newObjs.forEach((o, i) => { if(o.type === 'image') o.img = frames[index].objects[i].img; });
            frames.splice(index + 1, 0, { id: Date.now(), objects: newObjs, duration: frames[index].duration || 400 });
            selectFrame(index + 1);
        }

        function deleteFrame(index) {
            if (frames.length <= 1) return;
            frames.splice(index, 1);
            currentFrameIndex = Math.max(0, currentFrameIndex - 1);
            selectFrame(currentFrameIndex);
        }

        // --- Sticker Picker ---
        const STICKER_LIST = [
            '❤️','🧡','💛','💚','💙','💜','🖤','🤍','💕','💖',
            '🌟','⭐','✨','🌈','🌸','🌺','🌻','🍀','🎉','🎊',
            '🎈','🎀','🎁','🔥','💫','🌙','☀️','❄️','🌊','🦋',
        ];
        function openStickerModal() {
            const grid = document.getElementById('stickerGrid');
            grid.innerHTML = '';
            STICKER_LIST.forEach(emoji => {
                const btn = document.createElement('button');
                btn.style.cssText = 'font-size:36px;padding:8px;border-radius:14px;background:#F9FAFB;border:2px solid #E5E7EB;cursor:pointer;';
                btn.innerText = emoji;
                btn.onclick = () => { addSticker(emoji); closeStickerModal(); };
                grid.appendChild(btn);
            });
            document.getElementById('stickerModal').style.display = 'flex';
        }
        function closeStickerModal() { document.getElementById('stickerModal').style.display = 'none'; }
        function promptAddText() {
            document.getElementById('textModal').style.display = 'flex';
            document.getElementById('textInput').focus();
            updateStrokeWidthUI();
            updateLineHeightUI();
            updateTextPreview();
        }
        function setTextColor(color) {
            tempTextColor = color;
            document.getElementById('colorPreview').style.background = color;
            updateTextPreview();
        }
        function setStrokeColor(color) {
            tempStrokeColor = color;
            const preview = document.getElementById('strokeColorPreview');
            if (color === 'none') { preview.style.background = '#F3F4F6'; preview.innerHTML = '<span style="font-size:14px;line-height:32px;display:block;text-align:center;">✕</span>'; }
            else { preview.style.background = color; preview.innerHTML = ''; }
            updateTextPreview();
        }
        function setStrokeWidth(w) {
            tempStrokeWidth = w;
            updateStrokeWidthUI();
            updateTextPreview();
        }
        function setLineHeight(v) {
            tempLineHeight = v;
            updateLineHeightUI();
            updateTextPreview();
        }
        function updateStrokeWidthUI() {
            [0,3,6,12,20].forEach(v => {
                const btn = document.getElementById('sw-' + v);
                if (!btn) return;
                const active = v === tempStrokeWidth;
                btn.style.borderColor = active ? '#3B82F6' : '#E5E7EB';
                btn.style.background  = active ? '#EFF6FF' : '#F9FAFB';
                btn.style.color       = active ? '#2563EB' : '#6B7280';
            });
        }
        function updateLineHeightUI() {
            [10,14,19,25].forEach(v => {
                const btn = document.getElementById('lh-' + v);
                if (!btn) return;
                const val = v / 10;
                const active = Math.abs(val - tempLineHeight) < 0.05;
                btn.style.borderColor = active ? '#3B82F6' : '#E5E7EB';
                btn.style.background  = active ? '#EFF6FF' : '#F9FAFB';
                btn.style.color       = active ? '#2563EB' : '#6B7280';
            });
        }
        function updateTextPreview() {
            const cvs = document.getElementById('textPreviewCanvas');
            if (!cvs) return;
            const ctx = cvs.getContext('2d');
            const W = cvs.width, H = cvs.height;
            ctx.clearRect(0, 0, W, H);
            const rawText = document.getElementById('textInput').value || '預覽文字';
            const lines = rawText.split('\n');
            const fontSize = 26;
            ctx.font = 'bold ' + fontSize + 'px Noto Sans TC, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.lineJoin = 'round';
            const lh = tempLineHeight * fontSize;
            const totalH = lh * lines.length;
            const startY = H / 2 - (totalH - lh) / 2;
            lines.forEach((line, i) => {
                const y = startY + i * lh;
                if (tempStrokeWidth > 0 && tempStrokeColor !== 'none') {
                    ctx.strokeStyle = tempStrokeColor;
                    ctx.lineWidth = tempStrokeWidth * 0.65;
                    ctx.strokeText(line, W / 2, y);
                }
                ctx.fillStyle = tempTextColor;
                ctx.fillText(line, W / 2, y);
            });
        }
        function closeTextModal() { document.getElementById('textModal').style.display = 'none'; }
        function confirmAddText() {
            const val = document.getElementById('textInput').value;
            if (val.trim()) {
                frames[currentFrameIndex].objects.push({
                    type: 'text', content: val, x: 185, y: 160, scale: 1, rotation: 0,
                    color: tempTextColor, strokeColor: tempStrokeColor,
                    strokeWidth: tempStrokeWidth, lineHeight: tempLineHeight
                });
                selectedObjectIndex = frames[currentFrameIndex].objects.length - 1; updateUIState(); draw();
            }
            document.getElementById('textInput').value = ''; closeTextModal();
        }
        function addSticker(emoji) {
            frames[currentFrameIndex].objects.push({ type: 'sticker', content: emoji, x: 185, y: 160, scale: 1.5, rotation: 0 });
            selectedObjectIndex = frames[currentFrameIndex].objects.length - 1; updateUIState(); draw();
        }
        function handleFileUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const ratio = Math.min(150 / img.width, 150 / img.height);
                    frames[currentFrameIndex].objects.push({ type: 'image', img, w: img.width * ratio, h: img.height * ratio, x: 185, y: 160, scale: 1, rotation: 0 });
                    selectedObjectIndex = frames[currentFrameIndex].objects.length - 1; updateUIState(); draw();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        function deleteSelected() { if (selectedObjectIndex === -1) return; frames[currentFrameIndex].objects.splice(selectedObjectIndex, 1); selectedObjectIndex = -1; updateUIState(); draw(); }

        // --- Preview ---
        function previewAnimation() {
            if (isPreviewing) {
                clearTimeout(previewInterval); isPreviewing = false;
                document.getElementById('previewBtn').innerText = "預覽播放";
                document.getElementById('previewBtn').classList.replace('bg-black', 'bg-white');
                draw();
            } else {
                if (frames.length < 2) { alert('至少要兩個步驟喔！'); return; }
                isPreviewing = true; selectedObjectIndex = -1; updateUIState();
                document.getElementById('previewBtn').innerText = "停止預覽";
                document.getElementById('previewBtn').classList.replace('bg-white', 'bg-black');
                let pIndex = 0;
                function playNextFrame() {
                    if (!isPreviewing) return;
                    currentFrameIndex = pIndex; draw(); renderFrameList();
                    const delay = frames[pIndex].duration || 400;
                    pIndex = (pIndex + 1) % frames.length;
                    previewInterval = setTimeout(playNextFrame, delay);
                }
                playNextFrame();
            }
        }

        // --- Download single frame as PNG ---
        function downloadFramePNG(index) {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = 370;
            offCanvas.height = 320;
            const offCtx = offCanvas.getContext('2d');
            draw(offCtx, index, true);
            offCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `frame_${index + 1}_${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        // --- EXPORT GIF ---
        async function exportGIF() {
            if (frames.length < 2) { alert('請至少製作 2 個步驟再儲存喔！'); return; }
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            document.getElementById('loadingText').innerText = '正在製作 GIF，請稍候...';
            try {
                const offCanvas = document.createElement('canvas');
                offCanvas.width = 370; offCanvas.height = 320;
                const offCtx = offCanvas.getContext('2d');
                const gif = new GIF({ workers: 2, quality: 10, width: 370, height: 320 });
                for (let i = 0; i < frames.length; i++) {
                    draw(offCtx, i, true);
                    gif.addFrame(offCtx, { delay: frames[i].duration || 400, copy: true });
                }
                const blob = await new Promise(resolve => { gif.on('finished', b => resolve(b)); gif.render(); });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `sticker_${Date.now()}.gif`;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); URL.revokeObjectURL(url);
                alert('GIF 製作完成！已開始下載 🎉');
            } catch(err) {
                console.error(err); alert('製作過程中發生錯誤，請再試一次。');
            } finally {
                overlay.style.display = 'none';
            }
        }
    </script>
</body>
